  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- ================================================
         NetworkUp — Download APK Popup (Mobile Only)
    ================================================ -->
    <div id="nu-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:9999; align-items:flex-end; justify-content:center;">
      <div style="background:#fff; width:100%; max-width:480px; border-radius:24px 24px 0 0; overflow:hidden; box-shadow:0 -8px 40px rgba(0,0,0,0.2);">

        <div style="width:40px;height:4px;background:#e0e0e0;border-radius:2px;margin:14px auto 0;"></div>

        <div style="padding:24px 24px 36px;">

          <!-- Header -->
          <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;">
            <div style="width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,#1a73e8,#0d47a1);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <span style="font-size:28px;font-weight:700;color:#fff;font-family:sans-serif;">N</span>
            </div>
            <div>
              <p style="font-size:18px;font-weight:700;margin:0 0 2px;color:#111;font-family:sans-serif;">NetworkUp</p>
              <p style="font-size:13px;color:#888;margin:0;font-family:sans-serif;">networkup.in</p>
            </div>
            <button onclick="nuDismiss()" aria-label="Close" style="margin-left:auto;background:#f0f0f0;border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:16px;color:#666;display:flex;align-items:center;justify-content:center;padding:0;">&#10005;</button>
          </div>

          <!-- Title -->
          <p style="font-size:16px;font-weight:700;margin:0 0 6px;color:#111;font-family:sans-serif;">Get the NetworkUp App</p>
          <p style="font-size:13px;color:#666;margin:0 0 24px;line-height:1.7;font-family:sans-serif;">Download our Android app for a faster, smoother experience — works offline too!</p>

          <!-- App info row -->
          <div style="display:flex;gap:10px;margin-bottom:24px;">
            <div style="flex:1;padding:12px;background:#f7f9ff;border-radius:12px;text-align:center;">
              <p style="font-size:18px;margin:0 0 2px;"><img src="finger tip.svg" alt="finger tip"/></p>
              <p style="font-size:11px;color:#888;margin:0;font-family:sans-serif;">Finger Tip</p>
            </div>
            <div style="flex:1;padding:12px;background:#f7f9ff;border-radius:12px;text-align:center;">
              <p style="font-size:18px;margin:0 0 2px;"><img src="fast.svg" alt="Fast & Light"/></p>
              <p style="font-size:11px;color:#888;margin:0;font-family:sans-serif;">Fast & Light</p>
            </div>
            <div style="flex:1;padding:12px;background:#f7f9ff;border-radius:12px;text-align:center;">
              <p style="font-size:18px;margin:0 0 2px;"><img src="secure.svg" alt="Secure"/></p>
              <p style="font-size:11px;color:#888;margin:0;font-family:sans-serif;">Secure</p>
            </div>
            <div style="flex:1;padding:12px;background:#f7f9ff;border-radius:12px;text-align:center;">
              <p style="font-size:18px;margin:0 0 2px;"><img src="free.svg" alt="Free"/></p>
              <p style="font-size:11px;color:#888;margin:0;font-family:sans-serif;">Free</p>
            </div>
          </div>

          <!-- iOS warning -->
          <div id="nu-ios-note" style="display:none;padding:10px 14px;background:#fff8e1;border-radius:10px;margin-bottom:16px;">
            <p style="font-size:12px;color:#b36a00;margin:0;font-family:sans-serif;">⚠️ APK files are for Android only. iPhone users can add our site to the home screen instead.</p>
          </div>

          <!-- Download button -->
          <a id="nu-download-btn"
             href="https://github.com/networkupconnect/networkup-frontend/releases/download/v1.0/networkup.app.apk"
             download
             style="display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:15px;border-radius:14px;background:#1a73e8;color:#fff;font-size:15px;font-weight:700;text-decoration:none;font-family:sans-serif;box-sizing:border-box;margin-bottom:10px;">
            ⬇️ Download APK (Android)
          </a>

          <button onclick="nuDismiss()" style="width:100%;padding:13px;border-radius:14px;border:1px solid #ddd;background:transparent;cursor:pointer;font-size:14px;color:#888;font-family:sans-serif;">Maybe later</button>

        </div>
      </div>
    </div>

    <script>
    (function() {
      var STORAGE_KEY = 'nu_apk_popup_dismissed';
      var SHOW_DELAY = 3000;

      function nuDismiss() {
        document.getElementById('nu-overlay').style.display = 'none';
        try { localStorage.setItem(STORAGE_KEY, Date.now()); } catch(e) {}
      }
      window.nuDismiss = nuDismiss;

      function nuShow() {
        try {
          var dismissed = localStorage.getItem(STORAGE_KEY);
          if (dismissed && (Date.now() - parseInt(dismissed)) < 1 * 24 * 60 * 60 * 1000 ) return;
        } catch(e) {}

        // Skip if already running as installed PWA
        if (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) return;
        if (window.navigator.standalone) return;

        var ua = navigator.userAgent;
        var isIOS = /iPhone|iPad|iPod/i.test(ua);
        var isAndroid = /Android/i.test(ua);

        // ✅ Only show on mobile — skip laptops and desktops
        if (!isIOS && !isAndroid) return;

        if (isIOS) {
          document.getElementById('nu-ios-note').style.display = 'block';
          document.getElementById('nu-download-btn').style.opacity = '0.5';
          document.getElementById('nu-download-btn').style.pointerEvents = 'none';
        }

        document.getElementById('nu-overlay').style.display = 'flex';
      }

      document.getElementById('nu-overlay').addEventListener('click', function(e) {
        if (e.target === this) nuDismiss();
      });

      setTimeout(nuShow, SHOW_DELAY);
    })();
    </script>

  </body>
